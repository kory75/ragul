site_name: Ragul
site_description: An agglutinative programming language modelled on Hungarian suffix stacking
site_author: Kornel Farkas
repo_url: https://github.com/kory75/ragul

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - Language:
    - Syntax: syntax.md
    - Types: types.md
    - Functions & Scopes: functions.md
    - Control Flow: control.md
    - Effects & I/O: effects.md
    - Error Handling: errors.md
    - Modules: modules.md
  - Reference:
    - Standard Library: stdlib.md
    - Tooling & CLI: tooling.md
    - Glossary: glossary.md
  - Examples:
    - Hello World: examples/01_hello.md
    - Arithmetic: examples/02_arithmetic.md
    - Filter & Sort: examples/03_filter_sort.md
    - String Operations: examples/04_strings.md
    - Booleans & Comparisons: examples/05_booleans.md
    - List Operations: examples/06_list_operations.md
    - Error Handling: examples/07_error_handling.md
    - JSON Parsing: examples/08_json.md
    - CSV Processing: examples/09_csv.md
