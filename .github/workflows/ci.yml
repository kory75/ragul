name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest ragul/tests/ --tb=short --json-report --json-report-file=report.json

      - name: Type-check with mypy
        run: python -m mypy ragul/ --ignore-missing-imports

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: report.json
